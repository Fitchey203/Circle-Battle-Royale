<!DOCTYPE html>
<html>
<head>
<title>Loot Arena</title>
<style>
body {
    margin: 0;
    background: #0b1220;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

#uiPanel, #leaderboardPanel {
    position: fixed;
    top: 12px;
    z-index: 20;
    background: rgba(7, 15, 28, 0.82);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 12px;
    backdrop-filter: blur(6px);
}

#uiPanel {
    left: 12px;
    width: 220px;
}

#leaderboardPanel {
    right: 12px;
    width: 210px;
}

#inventory {
    position: fixed;
    left: 50%;
    bottom: 14px;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 10px;
    background: rgba(7, 15, 28, 0.82);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 10px 12px;
    backdrop-filter: blur(6px);
}

.slot {
    width: 96px;
    height: 58px;
    border: 2px solid #444;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 13px;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
}

.active {
    border-color: yellow;
}

input, button {
    font: inherit;
}

button {
    background: #1d4ed8;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 9px 12px;
    cursor: pointer;
}

input[type="text"], input[type="color"] {
    margin-top: 4px;
    margin-bottom: 8px;
    width: 100%;
    box-sizing: border-box;
}

#game {
    position: absolute;
    inset: 0;
}

#hint {
    position: fixed;
    left: 50%;
    top: 14px;
    transform: translateX(-50%);
    z-index: 30;
    background: rgba(0,0,0,0.42);
    padding: 8px 12px;
    border-radius: 999px;
}
</style>
</head>
<body>

<div id="uiPanel">
    <button id="startRoundBtn">START ROUND</button><br>
    Name:
    <input id="nameInput" type="text" maxlength="16" value="Fitchey">
    Color:
    <input id="colorInput" type="color" value="#38bdf8">

    <div id="roundInfo"></div>
    <div id="playerInfo" style="margin-top:10px;"></div>

    <div style="margin-top:10px; font-size:13px; opacity:0.92;">
        W A S D move<br>
        Shift sprint<br>
        Hold left click to fire<br>
        E open chest<br>
        Q use medkit<br>
        1-5 switch slot
    </div>
</div>

<div id="leaderboardPanel">
    <strong>Leaderboard</strong>
    <div id="leaderboard" style="margin-top:8px;"></div>
</div>

<div id="hint"></div>

<div id="inventory"></div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

const nameInput = document.getElementById('nameInput');
const colorInput = document.getElementById('colorInput');
const inventoryEl = document.getElementById('inventory');
const leaderboardEl = document.getElementById('leaderboard');
const roundInfoEl = document.getElementById('roundInfo');
const playerInfoEl = document.getElementById('playerInfo');
const hintEl = document.getElementById('hint');
const startRoundBtn = document.getElementById('startRoundBtn');

let players = {};
let renderPlayers = {};
let roads = [];
let bullets = [];
let chests = [];
let furniture = [];
let windows = [];
let buildings = [];
let leaderboard = [];
let glass = [];
let water = []; 
let grassDots = [];
let bushes = [];
let myId = null;
let camX = 0;
let camY = 0;
let world = { width: 3200, height: 2200 };
let roundActive = false;
let roundTime = 0;
let mouseDown = false;

const keys = {};

function isOnRoad(x, y) {
    const padding = 20;

    for (const r of roads) {
        if (
            x > r.x - padding &&
            x < r.x + r.w + padding &&
            y > r.y - padding &&
            y < r.y + r.h + padding
        ) {
            return true;
        }
    }
    return false;
}

function generateNature() {
    bushes = [];

    let attempts = 0;

    while (bushes.length < 120 && attempts < 300) {
        attempts++;

        const x = Math.random() * world.width;
        const y = Math.random() * world.height;

        // 🚫 skip roads
        if (isOnRoad(x, y)) continue;

        bushes.push({ x, y });
    }
}

function generateGrass() {
    grassDots = [];

    for (let i = 0; i < 4000; i++) {
        grassDots.push({
            x: Math.random() * world.width,
            y: Math.random() * world.height,
            color: Math.random() > 0.5 ? "#1f6d3b" : "#166534"
        });
    }
}

function resize() {
    const scale = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * scale;
    canvas.height = window.innerHeight * scale;

    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.addEventListener('resize', resize);
resize();
generateGrass();

function sendProfile() {
    socket.emit('updateProfile', {
        name: nameInput.value,
        color: colorInput.value
    });
}

nameInput.addEventListener('change', sendProfile);
colorInput.addEventListener('input', sendProfile);

startRoundBtn.addEventListener('click', () => {
    socket.emit('startRound');
});

socket.on('connect', () => {
    myId = socket.id;
    sendProfile();
});

socket.on('init', (data) => {
    buildings = data.buildings;
    world = data.world;
    roads = data.roads;
    water = data.water || [];
    generateNature();
});

socket.on('state', (data) => {
    players = data.players;
for (let id in players) {
    if (!renderPlayers[id]) {
        renderPlayers[id] = {
            x: players[id].x,
            y: players[id].y
        };
    }
}

for (let id in renderPlayers) {
    if (!players[id]) delete renderPlayers[id];
}

    bullets = data.bullets;
    chests = data.chests;
    furniture = data.furniture || [];
    windows = data.windows || [];
    glass = data.glass || [];
    water = data.water || [];
    buildings = data.buildings;
    roads = data.roads || [];
    leaderboard = data.leaderboard;
    roundActive = data.roundActive;
    roundTime = data.roundTimeLeft;

    updateLeaderboard();
    updateInventory();
    updateHud();
});

function updateLeaderboard() {
    leaderboardEl.innerHTML = leaderboard
        .map((p, i) => `${i + 1}. ${p.name} ${p.kills}/${p.deaths}`)
        .join('<br>');
}

function updateInventory() {
    const me = players[myId];
    if (!me) return;

    inventoryEl.innerHTML = '';

    me.inventory.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'slot ' + (i === me.selectedSlot ? 'active' : '');
        div.textContent = item || 'Empty';
        div.onclick = () => socket.emit('selectSlot', i);
        inventoryEl.appendChild(div);
    });
}

function updateHud() {
    const me = players[myId];
    if (!me) return;

    roundInfoEl.innerHTML = `Round: ${roundActive ? 'Running' : 'Waiting'}<br>Time: ${roundTime}s`;
    playerInfoEl.innerHTML = `Weapon: ${me.inventory[me.selectedSlot] || 'None'}<br>Health: ${me.health}<br>Stamina: ${Math.round(me.stamina)}<br>Medkits: ${me.medkits}`;
    startRoundBtn.disabled = roundActive;
    startRoundBtn.textContent = roundActive ? 'ROUND RUNNING' : 'START ROUND';

    let hint = '';
    for (const chest of chests) {
        if (Math.hypot(me.x - chest.x, me.y - chest.y) < 60) {
            hint = 'Press E to open chest';
            break;
        }
    }
    hintEl.textContent = hint;
}

document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;

    if (e.key.toLowerCase() === 'e') socket.emit('interact');
    if (e.key.toLowerCase() === 'q') socket.emit('useMedkit');

    if (['1', '2', '3', '4', '5'].includes(e.key)) {
        socket.emit('selectSlot', Number(e.key) - 1);
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
});

setInterval(() => {
    let dx = 0;
    let dy = 0;

    if (keys['w']) dy -= 1;
    if (keys['s']) dy += 1;
    if (keys['a']) dx -= 1;
    if (keys['d']) dx += 1;

    if (dx === 0 && dy === 0) return;

    socket.emit('move', {
        dx,
        dy,
        sprint: !!keys['shift']
    });
}, 1000 / 60);

canvas.addEventListener('mousemove', (e) => {
    const me = players[myId];
    if (!me || !me.alive || !roundActive) return;

    const playerScreenX = me.x - camX;
    const playerScreenY = me.y - camY;

    const angle = Math.atan2(
        e.clientY - playerScreenY,
        e.clientX - playerScreenX
    );

    socket.emit('aim', angle);
});

canvas.addEventListener('mousedown', () => {
    mouseDown = true;
});

canvas.addEventListener("wheel", (e) => {
    const me = players[myId];
    if (!me) return;

    let newSlot = me.selectedSlot + (e.deltaY > 0 ? 1 : -1);

    if (newSlot < 0) newSlot = 4;
    if (newSlot > 4) newSlot = 0;

    socket.emit("selectSlot", newSlot);
});

window.addEventListener('mouseup', () => {
    mouseDown = false;
});

setInterval(() => {
    if (mouseDown) socket.emit('shoot');
}, 1000 / 60);

function updateCamera() {
    const me = players[myId];
    if (!me) return;

    camX += (me.x - window.innerWidth / 2 - camX) * 0.14;
    camY += (me.y - window.innerHeight / 2 - camY) * 0.14;

    camX = Math.max(0, Math.min(world.width - window.innerWidth, camX));
    camY = Math.max(0, Math.min(world.height - window.innerHeight, camY));

}

function getThemeColors(theme) {
    if (theme === 'brick') return { outer: '#7a4438', inner: '#322928', trim: '#4f2b23' };
    if (theme === 'warehouse') return { outer: '#616a79', inner: '#262d38', trim: '#414853' };
    if (theme === 'apartment') return { outer: '#8a7d63', inner: '#2e2a24', trim: '#5d5342' };
    return { outer: '#6d7480', inner: '#252b35', trim: '#474f5c' };
}

function drawBackground() {
    ctx.fillStyle = "#1f4d2b";
    ctx.fillRect(0, 0, world.width, world.height);

    grassDots.forEach(g => {
        ctx.fillStyle = g.color;
        ctx.fillRect(g.x, g.y, 2, 2);
    });

    ctx.strokeStyle = '#1b3a5a';
    ctx.lineWidth = 1;

    for (let x = 0; x < world.width; x += 100) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, world.height);
        ctx.stroke();
    }

    for (let y = 0; y < world.height; y += 100) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(world.width, y);
        ctx.stroke();
    }
}

function drawWater() {
    water.forEach(w => {
        ctx.save();

        if (w.type === 'pond') {
            // Draw an ellipse
            ctx.beginPath();
            ctx.ellipse(w.cx, w.cy, w.rx, w.ry, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(30, 100, 180, 0.45)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(80, 160, 220, 0.6)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Subtle shimmer lines
            ctx.strokeStyle = 'rgba(180, 220, 255, 0.18)';
            ctx.lineWidth = 2;
            for (let i = -1; i <= 1; i++) {
                ctx.beginPath();
                ctx.moveTo(w.cx - w.rx * 0.6, w.cy + i * 18);
                ctx.lineTo(w.cx + w.rx * 0.6, w.cy + i * 18);
                ctx.stroke();
            }
        } else {
            // River
            ctx.fillStyle = 'rgba(30, 100, 180, 0.45)';
            ctx.fillRect(w.x, w.y, w.w, w.h);
            ctx.strokeStyle = 'rgba(80, 160, 220, 0.6)';
            ctx.lineWidth = 3;
            ctx.strokeRect(w.x, w.y, w.w, w.h);

            // Flow lines
            ctx.strokeStyle = 'rgba(180, 220, 255, 0.18)';
            ctx.lineWidth = 2;
            for (let i = w.y; i < w.y + w.h; i += 40) {
                ctx.beginPath();
                ctx.moveTo(w.x + 8, i);
                ctx.lineTo(w.x + w.w - 8, i);
                ctx.stroke();
            }
        }

        ctx.restore();
    });
}

function drawNature() {
    bushes.forEach(b => {
        ctx.shadowColor = 'rgba(0,80,0,0.3)';
        ctx.shadowBlur = 8;

        ctx.fillStyle = "#166534";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 18, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';

        ctx.fillStyle = "#22c55e";
        ctx.beginPath();
        ctx.arc(b.x - 5, b.y - 6, 7, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#16a34a";
        ctx.beginPath();
        ctx.arc(b.x + 5, b.y - 2, 5, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawRoads() {
    roads.forEach(r => {

        // road
        ctx.fillStyle = "#2f2f2f";
        ctx.fillRect(r.x, r.y, r.w, r.h);

        // sidewalks (both sides)
        ctx.fillStyle = "#9ca3af";

        if (r.w > r.h) {
            // horizontal road
            ctx.fillRect(r.x, r.y - 14, r.w, 14);
            ctx.fillRect(r.x, r.y + r.h, r.w, 14);
        } else {
            // vertical road
            ctx.fillRect(r.x - 14, r.y, 14, r.h);
            ctx.fillRect(r.x + r.w, r.y, 14, r.h);
        }

        // lane lines
        ctx.strokeStyle = "#facc15";
        ctx.lineWidth = 3;

        if (r.w > r.h) {
            for (let i = r.x; i < r.x + r.w; i += 80) {
                ctx.beginPath();
                ctx.moveTo(i, r.y + r.h / 2);
                ctx.lineTo(i + 25, r.y + r.h / 2);
                ctx.stroke();
            }
        } else {
            for (let i = r.y; i < r.y + r.h; i += 80) {
                ctx.beginPath();
                ctx.moveTo(r.x + r.w / 2, i);
                ctx.lineTo(r.x + r.w / 2, i + 25);
                ctx.stroke();
            }
        }
    });
}

function drawDoor(building) {
    const d = building.door;
    ctx.fillStyle = d.open ? '#8b6a4a' : '#6b4f35';

    if (d.side === 'bottom') {
        ctx.fillRect(building.x + d.offset, building.y + building.h - 18, d.size, 18);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(building.x + d.offset, building.y + building.h - 18, d.size * d.progress, 18);
    } else if (d.side === 'top') {
        ctx.fillRect(building.x + d.offset, building.y, d.size, 18);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(building.x + d.offset, building.y, d.size * d.progress, 18);
    } else if (d.side === 'left') {
        ctx.fillRect(building.x, building.y + d.offset, 18, d.size);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(building.x, building.y + d.offset, 18, d.size * d.progress);
    } else if (d.side === 'right') {
        ctx.fillRect(building.x + building.w - 18, building.y + d.offset, 18, d.size);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(building.x + building.w - 18, building.y + d.offset, 18, d.size * d.progress);
    }
}

function drawBuildings() {
    buildings.forEach((b) => {
        const colors = getThemeColors(b.theme);
        const r = 6; // corner radius

        // Shadow
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 16;
        ctx.shadowOffsetX = 6;
        ctx.shadowOffsetY = 6;

        // Sidewalk with rounded corners
        ctx.fillStyle = "#9ca3af";
        ctx.beginPath();
        ctx.roundRect(b.x - 14, b.y - 14, b.w + 28, b.h + 28, r + 4);
        ctx.fill();

        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        // Building shell
        ctx.fillStyle = colors.outer;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, r);
        ctx.fill();

        // Interior floor
        ctx.fillStyle = colors.inner;
        ctx.beginPath();
        ctx.roundRect(b.x + 14, b.y + 14, b.w - 28, b.h - 28, r - 2);
        ctx.fill();

        // Outline
        ctx.strokeStyle = colors.trim;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, r);
        ctx.stroke();

        drawDoor(b);
    });
}

function drawChests() {
    chests.forEach((c) => {
        ctx.fillStyle = '#8b5a2b';
        ctx.fillRect(c.x - 16, c.y - 12, 32, 24);

        ctx.fillStyle = '#facc15';
        ctx.fillRect(c.x - 16, c.y - 4, 32, 8);

        ctx.fillStyle = '#fef08a';
        ctx.fillRect(c.x - 4, c.y - 5, 8, 10);
    });
}

function drawFurniture() {
    furniture.forEach(f => {

        if (f.type === "table") {
            ctx.fillStyle = "#8b5a2b";
            ctx.fillRect(f.x, f.y, f.w, f.h);
        }

        if (f.type === "chair") {
            ctx.fillStyle = "#444";
            ctx.fillRect(f.x, f.y, f.w, f.h);
        }
    });
}

function drawWindows() {
    windows.forEach(w => {

        if (w.broken) {
            ctx.fillStyle = "#1f2937";
            ctx.fillRect(w.x, w.y, w.w, w.h);
            return;
        }

        ctx.fillStyle = "#0f172a";
        ctx.fillRect(w.x - 2, w.y - 2, w.w + 4, w.h + 4);

        ctx.fillStyle = "#3b82f6";
        ctx.globalAlpha = 0.5;
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.globalAlpha = 1;

        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.fillRect(w.x + 4, w.y + 3, 14, 4);
    });
}

function drawGlass() {
    if (!glass) return; // safety

    glass.forEach(g => {
        ctx.fillStyle = "rgba(173,216,230,0.7)";
        ctx.fillRect(g.x - 2, g.y - 2, 4, 4);
    });
}

function drawBullets() {
    bullets.forEach((b) => {
        ctx.fillStyle = b.color || '#ffffff';
        ctx.beginPath();
	ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
	ctx.fill();
    });
}

function drawPlayers() {
    for (let id in players) {
        const p = players[id];
        if (!p.alive) continue;

        if (!renderPlayers[id]) {
            renderPlayers[id] = { x: p.x, y: p.y };
        }

        renderPlayers[id].x += (p.x - renderPlayers[id].x) * 0.35;
        renderPlayers[id].y += (p.y - renderPlayers[id].y) * 0.35;

        const rx = renderPlayers[id].x;
        const ry = renderPlayers[id].y;

        // Soft glow
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 12;

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(rx, ry, 16, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';

        // Eye
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(rx + 6, ry - 4, 3, 0, Math.PI * 2);
        ctx.fill();

        // Weapon line
        const weapon = p.inventory[p.selectedSlot];
        ctx.strokeStyle = {
            Pistol: "#ffffff",
            AR: "#60a5fa",
            Shotgun: "#f59e0b",
            SMG: "#34d399",
            Sniper: "#f87171"
        }[weapon] || "#ffffff";
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(rx, ry);
        ctx.lineTo(
            rx + Math.cos(p.weaponAngle) * 25,
            ry + Math.sin(p.weaponAngle) * 25
        );
        ctx.stroke();
        ctx.lineCap = 'butt';

        // Health bar (rounded)
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.roundRect(rx - 20, ry - 30, 40, 5, 3);
        ctx.fill();

        ctx.fillStyle = p.health > 50 ? '#22c55e' : p.health > 25 ? '#f59e0b' : '#ef4444';
        ctx.beginPath();
        ctx.roundRect(rx - 20, ry - 30, (p.health / 100) * 40, 5, 3);
        ctx.fill();

        // Name
        ctx.fillStyle = 'white';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, rx, ry - 36);
    }
}

function drawMinimap() {
    const size = 160;
    const x = window.innerWidth - size - 12;
    const y = window.innerHeight - size - 12;

    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(x, y, size, size);

    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.strokeRect(x, y, size, size);

    buildings.forEach((b) => {
        ctx.fillStyle = '#555';
        ctx.fillRect(
            x + (b.x / world.width) * size,
            y + (b.y / world.height) * size,
            (b.w / world.width) * size,
            (b.h / world.height) * size
        );
    });

    chests.forEach((c) => {
        ctx.fillStyle = '#facc15';
        ctx.fillRect(
            x + (c.x / world.width) * size - 2,
            y + (c.y / world.height) * size - 2,
            4,
            4
        );
    });

    for (let id in players) {
        const p = players[id];
        if (!p.alive) continue;
        ctx.fillStyle = id === myId ? 'lime' : 'red';
        ctx.fillRect(
            x + (p.x / world.width) * size - 2,
            y + (p.y / world.height) * size - 2,
            4,
            4
        );
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    updateCamera();

    ctx.save();
    ctx.translate(-camX, -camY);

    drawBackground();
    drawRoads();
    drawWater();
    drawNature();
    drawBuildings();
    drawWindows();
    drawGlass();
    drawFurniture();
    drawChests();
    drawBullets();
    drawPlayers();

    ctx.restore();

    drawMinimap();

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
